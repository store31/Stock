<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلبية</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .container { background: white; max-width: 400px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        label { display: block; text-align: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>تأكيد طلبية الحذاء</h2>
    <form id="orderForm">
        <label>الاسم واللقب:</label>
        <input type="text" name="name" placeholder="الاسم" required style="width:48%">
        <input type="text" name="surname" placeholder="اللقب" required style="width:48%">

        <label>رقم الهاتف:</label>
        <input type="tel" name="phone" placeholder="06XXXXXXXX" required>

        <label>العنوان:</label>
        <input type="text" name="address" placeholder="الولاية والبلدية" required>

        <input type="hidden" name="product" value="Nike Air Max">

        <label>اللون:</label>
        <select name="color">
            <option value="أسود">أسود</option>
            <option value="أحمر">أحمر</option>
        </select>

        <label>التوصيل:</label>
        <select name="transport">
            <option value="Yalidine">Yalidine</option>
            <option value="StopDesk">StopDesk</option>
        </select>

        <button type="submit" id="submitBtn">تأكيد الطلب</button>
    </form>
</div>

<script>
    // الرابط الجديد اللي عطيتهولي دروك (تأكد باللي راه كامل)
    const scriptURL = 'https://script.google.com/macros/s/AKfycby7-nfZ36-hMfmizXgWcz_ISfO7xRHYgD1DQRjUdFvyvGFvhzanYWuTNrzeqsE5aBN1/exec'

    const form = document.getElementById('orderForm')

    form.addEventListener('submit', e => {
        e.preventDefault()
        document.getElementById('submitBtn').disabled = true
        document.getElementById('submitBtn').innerText = "جاري الإرسال..."

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("صحة خويا! الطلبية وصلت لتلغرام وللشيت.")
                form.reset()
                document.getElementById('submitBtn').disabled = false
                document.getElementById('submitBtn').innerText = "تأكيد الطلب"
            })
            .catch(error => {
                console.error('Error!', error.message)
                alert("كاين مشكل صغير، تأكد من اتصال الإنترنت!")
                document.getElementById('submitBtn').disabled = false
                document.getElementById('submitBtn').innerText = "تأكيد الطلب"
            })
    })
</script>

</body>
</html>
