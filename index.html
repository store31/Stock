<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلبية</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; text-align: center; direction: rtl; }
        .container { background: white; max-width: 420px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        label { display: block; text-align: right; font-weight: bold; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 20px;">استمارة طلب المنتج</h2>
    <form id="orderForm">
        <label>الاسم واللقب:</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" name="name" placeholder="الاسم" required>
            <input type="text" name="surname" placeholder="اللقب" required>
        </div>

        <label>رقم الهاتف:</label>
        <input type="tel" name="phone" placeholder="06XXXXXXXX" required>

        <label>العنوان الكامل:</label>
        <input type="text" name="address" placeholder="الولاية، البلدية، الحي" required>

        <label>اللون المطلوب:</label>
        <select name="color" required>
            <option value="أسود">أسود</option>
            <option value="أحمر">أحمر</option>
            <option value="أبيض">أبيض</option>
        </select>

        <label>وسيلة النقل:</label>
        <select name="transport" required>
            <option value="Yalidine">Yalidine</option>
            <option value="StopDesk">StopDesk</option>
        </select>

        <input type="hidden" name="product" value="Nike Air Max">

        <button type="submit" id="submitBtn">إرسال الطلب الآن</button>
    </form>
    <p id="loadingMsg" style="display:none; color: #007bff; font-weight: bold; margin-top: 15px;">⏳ جاري المعالجة... انتظر ثانية</p>
</div>

    
<script>
    // الرابط الصحيح اللي جبته دروك (تأكد بلي يبدأ بـ https ويخلص بـ exec)
    const scriptURL = 'https://script.google.com/macros/s/AKfycby7-nfZ36-hMfmizXgWcz_ISfO7xRHYgD1DQRjUdFvyvGFvhzanYWuTNrzeqsE5aBN1/exec'
    const form = document.getElementById('orderForm')
    const btn = document.getElementById('submitBtn')

    form.addEventListener('submit', e => {
        e.preventDefault()
        btn.disabled = true
        btn.innerText = "جاري الإرسال..."

        // إرسال البيانات لـ Google Sheets وتلغرام
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("صحة خويا! الطلبية تسجلت ووصلت لتلغرام.")
                form.reset()
                btn.disabled = false
                btn.innerText = "تأكيد الطلب"
            })
            .catch(error => {
                console.error('Error!', error.message)
                alert("كاين مشكل صغير، عاود جرب!")
                btn.disabled = false
                btn.innerText = "تأكيد الطلب"
            })
    })
</script>


</body>
</html>
