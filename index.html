<!<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الأحذية الرياضية</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 10px; }
        h2 { color: #333; }
        .price { font-size: 24px; color: #e44d26; font-weight: bold; margin: 10px 0; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
        button:hover { background-color: #218838; }
        #loading { display: none; color: blue; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80" alt="حذاء رياضي">
    <h2>حذاء رياضي Air Max - أصلي</h2>
    <p class="price">8500 د.ج</p>
    <p>توصيل سريع لجميع الولايات</p>

    <hr>

    <h3>إملأ البيانات لإتمام الطلب</h3>
    <form id="orderForm">
        <input type="text" name="name" placeholder="الاسم" required>
        <input type="text" name="surname" placeholder="اللقب" required>
        <input type="text" name="address" placeholder="العنوان (الولاية والبلدية)" required>
        <input type="text" name="product" value="حذاء Air Max - 1 زوج" readonly>
        
        <select name="color" required>
            <option value="">اختر اللون</option>
            <option value="أحمر">أحمر</option>
            <option value="أسود">أسود</option>
            <option value="أزرق">أزرق</option>
        </select>

        <select name="transport" required>
            <option value="">وسيلة النقل</option>
            <option value="Yalidine">Yalidine (توصيل للمنزل)</option>
            <option value="StopDesk">StopDesk (توصيل للمكتب)</option>
        </select>

        <button type="submit" id="submitBtn">تأكيد الطلبية</button>
    </form>
    <div id="loading">جاري إرسال طلبك... استنى شوية</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyimSIeKRNzQAlEAC2P0Jl229MGJB4BBT4M166c-oDBJ1QAfsJCSa6MX0YCBUvmGe8/exec'
    const form = document.getElementById('orderForm')
    const btn = document.getElementById('submitBtn')
    const loading = document.getElementById('loading')

    form.addEventListener('submit', e => {
        e.preventDefault()
        btn.disabled = true
        loading.style.display = 'block'

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                loading.style.display = 'none'
                btn.disabled = false
                alert("صحة خويا! الطلبية وصلتني، دروك نعيطولك في التيليفون.")
                form.reset()
            })
            .catch(error => {
                loading.style.display = 'none'
                btn.disabled = false
                console.error('Error!', error.message)
                alert("صرى مشكل صغير، عاود سيي!")
            })
    })
</script>

</body>
</html>
