<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralNode - تحويل الفيديوهات بذكاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-8 rounded-2xl shadow-2xl w-full max-auto max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">ViralNode 🚀</h1>
        <p class="text-gray-400 text-center mb-8">حط رابط اليوتيوب وخلّي الذكاء الاصطناعي يخدم خدمته.</p>
        
        <form id="viralForm" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">رابط YouTube</label>
                <input type="url" id="yt_url" placeholder="https://youtube.com/..." class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm mb-1">البريد الإلكتروني</label>
                <input type="email" id="user_email" placeholder="name@example.com" class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm mb-1">نوع التلخيص</label>
                <select id="service_type" class="w-full p-3 rounded bg-gray-800 border border-gray-700 outline-none">
                    <option value="short_reel">30-60 ثانية (TikTok/Reel)</option>
                    <option value="medium_video">3-5 دقائق (ملخص عميق)</option>
                    <option value="full_pack">الباقة الكاملة (Cross-Platform)</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 transition p-3 rounded-lg font-bold">ابدأ التجربة (Test)</button>
        </form>
        <div id="status" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        const webhookUrl = 'حط_هنا_URL_الـ_Webhook_من_n8n'; 

        document.getElementById('viralForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "جاري الإرسال... انتظر ثواني ⏳";
            status.classList.remove('hidden');

            const data = {
                url: document.getElementById('yt_url').value,
                email: document.getElementById('user_email').value,
                type: document.getElementById('service_type').value
            };

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(response.ok) status.innerText = "تم الإرسال بنجاح! تفقد إيميلك بعد قليل ✅";
                else status.innerText = "حدث خطأ، تأكد من إعدادات n8n ❌";
            } catch (error) {
                status.innerText = "خطأ في الاتصال بالسيرفر ❌";
            }
        };
    </script>
</body>
</html>
